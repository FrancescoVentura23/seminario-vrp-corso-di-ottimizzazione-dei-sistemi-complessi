<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Vehicle Routing Problems — Seminar</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<!-- Google Fonts: Atkinson Hyperlegible (display + body, high readability) + JetBrains Mono -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- KaTeX for math -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

<link rel="stylesheet" href="styles.css"/>

<style>
  html, body { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; }
  body { font-family: "Atkinson Hyperlegible", -apple-system, BlinkMacSystemFont, sans-serif; }
</style>
</head>
<body>

<!-- Default-tweaks block: persisted by host when the user changes them -->
<script>
const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "theme": "editorial",
  "showGrid": false
}/*EDITMODE-END*/;
</script>

<deck-stage width="1920" height="1080" id="stage">
  <section id="root-mount" class="slide" data-label="loading" style="background: #f6f1e4; display:flex; align-items:center; justify-content:center; font-family: 'Atkinson Hyperlegible', sans-serif;">
    <div style="font-size: 80px;">Loading…</div>
  </section>
</deck-stage>

<!-- Tweaks panel — appears when user toggles Tweaks in toolbar -->
<div id="tweaks" class="tweaks">
  <h4>Tweaks</h4>
  <div class="row">
    <label>Theme</label>
  </div>
  <div class="row">
    <button data-theme="editorial">Editorial</button>
    <button data-theme="blueprint">Blueprint</button>
    <button data-theme="midnight">Midnight</button>
  </div>
</div>

<script src="deck-stage.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="demo.jsx"></script>
<script type="text/babel" src="slides/01-cover.jsx"></script>
<script type="text/babel" src="slides/02-intro.jsx"></script>
<script type="text/babel" src="slides/03-foundations.jsx"></script>
<script type="text/babel" src="slides/04-vrp-elements.jsx"></script>
<script type="text/babel" src="slides/05-tsp.jsx"></script>
<script type="text/babel" src="slides/06-cvrp.jsx"></script>
<script type="text/babel" src="slides/07-complexity.jsx"></script>
<script type="text/babel" src="slides/08-family.jsx"></script>
<script type="text/babel" src="slides/09-live-demo.jsx"></script>
<script type="text/babel" src="slides/10-applications.jsx"></script>

<script type="text/babel">
// ---------- Mount all slides into <deck-stage> ----------
// Slide order mirrors the file layout under slides/. Each file loaded above
// registers its Slide* functions on window, and the mount waits until the
// last-registered symbol from every file is present before building the deck.
(function mountDeck() {
  // One sentinel per slides/ file (the last function registered in it) plus
  // ClarkeWrightDemo from demo.jsx.
  const sentinels = [
    "Slide01",           // 01-cover.jsx
    "SlideWhoUsesIt",    // 02-intro.jsx
    "SlideNetwork",      // 03-foundations.jsx
    "Slide08",           // 04-vrp-elements.jsx
    "Slide10B",          // 05-tsp.jsx
    "Slide15",           // 06-cvrp.jsx
    "Slide18",           // 07-complexity.jsx
    "Slide23",           // 08-family.jsx
    "Slide26",           // 09-live-demo.jsx
    "Slide30",           // 10-applications.jsx
    "ClarkeWrightDemo",  // demo.jsx
  ];

  function tryMount() {
    if (sentinels.some((k) => !window[k])) {
      setTimeout(tryMount, 60);
      return;
    }
    const stage = document.getElementById("stage");
    const placeholder = document.getElementById("root-mount");
    if (placeholder) placeholder.remove();

    // Deck order — see CLAUDE.md for the human-readable table.
    // NOTE: Complexity (Part IV) is now placed BEFORE TSP and CVRP, so the
    // vocabulary of Big-O / branch-and-cut / lazy cuts is introduced before
    // the TSP slides actually use it.
    const slides = [
      Slide01,                                                                                         // Part I — cover
      SlideIntroSection, SlideHistory, SlideORLink, Slide02, Slide03, SlideWhoUsesIt,                  // Part I — intro
      Slide05, SlideNode, SlideNodeAttributes, SlideEdge, SlideSimpleGraph,                            // Part II — foundations
      SlideDirectedArc, SlideDigraph, SlideStarNotation, SlideNetwork,
      SlideVRPElementsSection, Slide06, Slide07, Slide08,                                              // Part III — VRP elements
      Slide16, Slide17A, Slide17AGrowth, Slide17B, Slide17C, Slide18,                                   // Part IV — complexity (Big-O → growth rates → classes → exact algos → heuristics)
      SlideTSPSection, Slide09, SlideTSPHamiltonian, SlideTSPFormulation,                              // Part V — TSP
      SlideTSPDegree, SlideTSPSubtourProblem, SlideTSPDFJ, SlideTSPExponential, SlideTSPLazy, SlideTSPKeyIdentity, SlideTSPMinCut, SlideTSPMinCutAlgo, SlideTSPMinCutImpl,
      Slide11, Slide17, Slide10, Slide10B, Slide14, Slide14B, Slide15, Slide15B, Slide15C,             // Part VI — CVRP (Slide17 = NP-hard intro; Slide10+10B = TSP→CVRP bridge)
      Slide19, Slide20, Slide21,                                                                       // Part VII — family
      Slide22Intro, Slide22Load, Slide22,                                                              //   VRPB primer (intro/load) + rule
      Slide23Intro, Slide23Load, Slide23,                                                              //   VRPPD primer (intro/load) + rule
      Slide24, Slide25, Slide26,                                                                       // Part VIII — live demo
      Slide27, Slide28, Slide29, Slide30,                                                              // Part IX — applications
    ];

    // Mount all slides into a single React root that targets <deck-stage>
    // directly. The earlier approach used one ReactDOM.createRoot per slide
    // and moved each <section> out of its host with appendChild. That worked
    // visually, but with React 18's concurrent reconciler the per-slide roots
    // could share state across roots: in practice TeX expressions from one
    // slide's <span> ended up rendered into another slide's <span>. A single
    // root keeps every slide inside one reconciler tree, eliminating the leak.
    const root = ReactDOM.createRoot(stage);
    ReactDOM.flushSync(() => {
      root.render(
        <React.Fragment>
          {slides.map((SlideComp, i) => <SlideComp key={i}/>)}
        </React.Fragment>
      );
    });

    // Re-apply KaTeX after children settle
    setTimeout(() => {
      if (window.renderMathInElement) {
        // not used — we render via imperative TeX component
      }
    }, 500);
  }
  tryMount();
})();

// ---------- Page counter sync ----------
window.addEventListener('message', (ev) => {
  const d = ev.data || {};
  if (typeof d.slideIndexChanged === 'number') {
    const total = document.querySelectorAll('deck-stage > section.slide').length || 52;
    const n = String(d.slideIndexChanged + 1).padStart(2, '0');
    const t = String(total).padStart(2, '0');
    document.querySelectorAll('[data-chrome-pg]').forEach(el => {
      el.textContent = `${n} / ${t}`;
    });
  }
});

// ---------- Tweaks protocol ----------
(function tweaks() {
  const stage = document.getElementById("stage");
  const panel = document.getElementById("tweaks");
  const state = Object.assign({}, window.TWEAK_DEFAULS || {});

  const apply = () => {
    stage.setAttribute("data-theme", state.theme || "editorial");
    panel.querySelectorAll("button[data-theme]").forEach(b => {
      if (b.dataset.theme === (state.theme || "editorial")) b.setAttribute("data-active", "");
      else b.removeAttribute("data-active");
    });
  };
  apply();

  panel.querySelectorAll("button[data-theme]").forEach(b => {
    b.addEventListener("click", () => {
      state.theme = b.dataset.theme;
      apply();
      try {
        window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { theme: state.theme } }, "*");
      } catch (e) {}
    });
  });

  window.addEventListener("message", (ev) => {
    const d = ev.data || {};
    if (d.type === "__activate_edit_mode") panel.setAttribute("data-open", "");
    if (d.type === "__deactivate_edit_mode") panel.removeAttribute("data-open");
  });
  try {
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
  } catch (e) {}
})();
</script>

</body>
</html>
